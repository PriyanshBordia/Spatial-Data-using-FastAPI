<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" crossorigin="anonymous">
	<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js" crossorigin="anonymous"></script>
	<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" crossorigin="anonymous"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>

	<style>
		/* ─── Theme Variables (Light) ─────────────────────── */
		:root {
			--bg: #f0f2f5;
			--text-primary: #212529;
			--text-secondary: #6c757d;
			--text-muted: #adb5bd;
			--badge-bg: #e9ecef;
			--badge-text: #495057;
			--hover-bg: #f8f9fa;
			--border-color: #e9ecef;

			--nav-bg: #f8f9fa;
			--nav-text: rgba(0,0,0,0.5);
			--nav-brand: rgba(0,0,0,0.9);
			--nav-border: #dee2e6;

			--page-bg: #fff;
			--card-bg: #fff;
			--input-bg: #fff;
			--input-border: #ced4da;
			--input-text: #495057;

			--btn-outline-success-text: #28a745;
			--btn-outline-success-border: #28a745;
			--btn-outline-warning-text: #ffc107;
			--btn-outline-warning-border: #ffc107;

			--toggle-bg: rgba(0,0,0,0.08);
			--toggle-icon: #495057;
		}

		/* ─── Theme Variables (Dark) ──────────────────────── */
		body.dark {
			--bg: #0a0a1a;
			--text-primary: #e8e8f0;
			--text-secondary: #8888a8;
			--text-muted: #5a5a7a;
			--badge-bg: #2a2a4a;
			--badge-text: #b0b0d0;
			--hover-bg: #1e1e38;
			--border-color: #2a2a4a;

			--nav-bg: #0e0e20;
			--nav-text: rgba(255,255,255,0.55);
			--nav-brand: rgba(255,255,255,0.9);
			--nav-border: #2a2a4a;

			--page-bg: #111125;
			--card-bg: #141428;
			--input-bg: #1a1a30;
			--input-border: #2a2a4a;
			--input-text: #d0d0e0;

			--btn-outline-success-text: #5bdb7b;
			--btn-outline-success-border: #5bdb7b;
			--btn-outline-warning-text: #ffd93d;
			--btn-outline-warning-border: #ffd93d;

			--toggle-bg: rgba(255,255,255,0.1);
			--toggle-icon: #b0b0d0;
		}

		/* ─── Base Styles ─────────────────────────────────── */
		body {
			background: var(--page-bg);
			color: var(--text-primary);
			transition: background 0.3s, color 0.3s;
		}

		/* ─── Navbar ──────────────────────────────────────── */
		body.dark .navbar {
			background: var(--nav-bg) !important;
			border-color: var(--nav-border) !important;
		}
		body.dark .navbar-brand { color: var(--nav-brand) !important; }
		body.dark .nav-link { color: var(--nav-text) !important; }
		body.dark .nav-link:hover { color: var(--text-primary) !important; }
		body.dark .navbar-toggler { border-color: var(--nav-border); }
		body.dark .navbar-toggler-icon { filter: invert(1) brightness(0.7); }

		/* ─── Forms ───────────────────────────────────────── */
		body.dark .form-control,
		body.dark .form-control-file {
			background-color: var(--input-bg);
			border-color: var(--input-border);
			color: var(--input-text);
		}
		body.dark .form-control:focus {
			background-color: var(--input-bg);
			color: var(--input-text);
			border-color: #4e79a7;
			box-shadow: 0 0 0 0.2rem rgba(78,121,167,0.25);
		}
		body.dark .col-form-label { color: var(--text-primary); }
		body.dark .form-text { color: var(--text-secondary) !important; }

		/* ─── Buttons ─────────────────────────────────────── */
		body.dark .btn-outline-success {
			color: var(--btn-outline-success-text);
			border-color: var(--btn-outline-success-border);
		}
		body.dark .btn-outline-success:hover {
			background-color: var(--btn-outline-success-border);
			color: #0a0a1a;
		}
		body.dark .btn-outline-warning {
			color: var(--btn-outline-warning-text);
			border-color: var(--btn-outline-warning-border);
		}
		body.dark .btn-outline-warning:hover {
			background-color: var(--btn-outline-warning-border);
			color: #0a0a1a;
		}

		/* ─── Alerts ──────────────────────────────────────── */
		body.dark .alert-danger {
			background-color: #2e1215;
			border-color: #5c2228;
			color: #ff8a8a;
		}
		body.dark .alert-success {
			background-color: #0e2e1a;
			border-color: #1a5c30;
			color: #7bff9e;
		}
		body.dark .alert .close { color: var(--text-secondary); }

		/* ─── Headings / Containers ───────────────────────── */
		body.dark h2 { color: var(--text-primary); }

		/* ─── Theme Toggle Button ─────────────────────────── */
		#theme-toggle {
			position: fixed;
			bottom: 20px;
			left: 20px;
			z-index: 1001;
			width: 44px;
			height: 44px;
			border-radius: 50%;
			border: none;
			background: var(--toggle-bg);
			color: var(--toggle-icon);
			font-size: 1.3rem;
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: background 0.2s, color 0.2s;
			backdrop-filter: blur(8px);
		}
		#theme-toggle:hover { opacity: 0.8; }
	</style>

	{% block head %}{% endblock %}
	<title>{% block title %}{% endblock %}</title>
</head>
<body class="{% block body_class %}{% endblock %}">
	<nav class="navbar navbar-expand-lg navbar-light bg-light border" role="navigation" style="z-index: 1000;">
		<a class="navbar-brand" href="/web"> Spatial Data </a>
		<button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
			<span class="navbar-toggler-icon"></span>
		</button>
		<div class="collapse navbar-collapse" id="navbarNavAltMarkup">
			<div class="navbar-nav ml-auto">
				<a class="nav-item nav-link mr-4" href="/docs">API Docs</a>
				<a class="nav-item nav-link mr-4" href="/web/country/add">Add Country</a>
				<a class="nav-item nav-link mr-4" href="/web/upload">Upload</a>
			</div>
		</div>
	</nav>

	{% block messages %}{% endblock %}

	{% block body %}
	{% endblock %}

	<button id="theme-toggle" title="Toggle dark mode">&#9790;</button>

	<script>
		(function() {
			var isDark = localStorage.getItem('theme') === 'dark';
			if (isDark) document.body.classList.add('dark');
			document.getElementById('theme-toggle').textContent = isDark ? '\u2600' : '\u263E';

			document.getElementById('theme-toggle').addEventListener('click', function() {
				isDark = !isDark;
				document.body.classList.toggle('dark', isDark);
				localStorage.setItem('theme', isDark ? 'dark' : 'light');
				this.textContent = isDark ? '\u2600' : '\u263E';
				window.dispatchEvent(new CustomEvent('themechange', { detail: { dark: isDark } }));
			});
		})();
	</script>
</body>
</html>
